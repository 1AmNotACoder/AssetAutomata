  <rect x="14" y="24" width="30" height="30" rx="3" fill="#FFFFFF"/>
  <rect x="56" y="24" width="30" height="30" rx="3" fill="#FFFFFF" opacity="0.55"/>
  <rect x="14" y="66" width="30" height="30" rx="3" fill="#FFFFFF" opacity="0.55"/>
  <rect x="56" y="66" width="30" height="30" rx="3" fill="#FFFFFF" opacity="0.22"/>
  <circle cx="71" cy="81" r="5" fill="#FFFFFF" opacity="0.9"/>

